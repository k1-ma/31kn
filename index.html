    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Koshyk",
        "applicationCategory": "FinanceApplication",
        "operatingSystem": "Web, Android, iOS",
        "description": "Personal finance tracker: wallets, categories, transactions, budgets, goals. Works offline.",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "aggregateRating": { "@type": "AggregateRating", "ratingValue": "5", "reviewCount": "1" }
      }
    </script>
    <script>
      // Apply theme before React mounts to avoid a flash of wrong-mode UI.
      // Source of truth: localStorage["koshyk:theme"] = "light" | "dark" | "system".
      // Default: system preference.
      (function() {
        try {
          var theme = localStorage.getItem('koshyk:theme') || 'system';
          var prefersDark = window.matchMedia &&
            window.matchMedia('(prefers-color-scheme: dark)').matches;
          var dark = theme === 'dark' || (theme === 'system' && prefersDark);
          if (dark) document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {
          // ignore - leave default light theme
        }
      })();
    </script>
    <style>
      /* Pre-React boot screen. Visible from first paint until React mounts;
         #boot-screen is removed in src/main.jsx after createRoot.render().
         Without this, an empty <div id="root"> on a #0B0E11 body looks like
         a frozen black screen if JS is slow, blocked, or errors out. */
      #boot-screen {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        background: #F7F8FA;
        color: #0F172A;
      }
      html.dark #boot-screen {
        background: #0B1220;
        color: #F1F5F9;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        font-size: 13px;
        letter-spacing: 0.04em;
        z-index: 0;
      }
      #boot-screen .boot-spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 2px solid rgba(99, 102, 241, 0.18);
        border-top-color: #6366F1;
        animation: boot-spin 0.9s linear infinite;
      }
      #boot-screen .boot-recovery {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        max-width: 360px;
        text-align: center;
        padding: 0 24px;
      }
      #boot-screen.boot-stuck .boot-spinner,
      #boot-screen.boot-stuck .boot-label { display: none; }
      #boot-screen.boot-stuck .boot-recovery { display: flex; }
      #boot-screen .boot-btn {
        appearance: none;
        border: 1px solid rgba(99, 102, 241, 0.35);
        background: rgba(99, 102, 241, 0.12);
        color: #0F172A;
        padding: 10px 18px;
        border-radius: 4px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }
      #boot-screen .boot-btn:hover { background: rgba(99, 102, 241, 0.2); }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="boot-screen" aria-live="polite">
      <div class="boot-spinner" aria-hidden="true"></div>
      <div class="boot-label">Loading…</div>
      <div class="boot-recovery">
        <div>The app is taking longer than usual to start. This usually means a stale cache.</div>
        <button class="boot-btn" id="boot-recover-btn" type="button">Reset cache &amp; reload</button>
      </div>
    </div>
    <script>
      // Watchdog: if React hasn't removed #boot-screen within 12s, surface a
      // recovery button so the user is never stranded on a frozen black page
      // from a broken SW precache or a module-load failure.
      (function() {
        var STUCK_MS = 12000;
        var t = setTimeout(function() {
          var el = document.getElementById('boot-screen');
          if (el) el.classList.add('boot-stuck');
        }, STUCK_MS);
        window.__bootScreenClear = function() { clearTimeout(t); };
        var btn = document.getElementById('boot-recover-btn');
        if (btn) {
          btn.addEventListener('click', function() {
            btn.disabled = true;
            btn.textContent = 'Resetting…';
            var tasks = [];
            try {
              if ('serviceWorker' in navigator) {
                tasks.push(navigator.serviceWorker.getRegistrations().then(function(rs) {
                  return Promise.all(rs.map(function(r) { return r.unregister(); }));
                }).catch(function() {}));
              }
            } catch (e) {}
            try {
              if (typeof caches !== 'undefined' && caches.keys) {
                tasks.push(caches.keys().then(function(keys) {
                  return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                }).catch(function() {}));
              }
            } catch (e) {}
            Promise.all(tasks).then(function() {
              window.location.reload();
            }, function() {
              window.location.reload();
            });
          });
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
